---
- name: Add Grafana apt key
  apt_key:
    url: https://apt.grafana.com/gpg.key
    state: present

- name: Add Grafana repository
  apt_repository:
    repo: "deb https://apt.grafana.com stable main"
    filename: grafana
    state: present

- name: Install Grafana
  apt:
    name: grafana
    state: present
    update_cache: yes

- name: Deploy Grafana config
  template:
    src: grafana.ini.j2
    dest: /etc/grafana/grafana.ini
    owner: root
    group: grafana
    mode: '0640'
  notify: restart grafana

- name: Deploy Prometheus datasource
  template:
    src: datasource.yml.j2
    dest: /etc/grafana/provisioning/datasources/prometheus.yml
    owner: root
    group: grafana
    mode: '0640'
  notify: restart grafana

- name: Start Grafana
  systemd:
    name: grafana-server
    enabled: yes
    state: started
    daemon_reload: yes

- name: Wait for Grafana to be ready
  wait_for:
    host: 127.0.0.1
    port: 3000
    timeout: 30

- name: Reset Grafana admin password
  command: >
    grafana cli
    --homepath /usr/share/grafana
    --config /etc/grafana/grafana.ini
    admin reset-admin-password {{ grafana_admin_password }}
  changed_when: false
  no_log: true
