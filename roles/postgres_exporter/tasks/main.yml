---
- name: Create postgres_exporter user
  user:
    name: postgres_exporter
    system: yes
    shell: /bin/false
    create_home: no

- name: Download postgres_exporter
  get_url:
    url: "https://github.com/prometheus-community/postgres_exporter/releases/download/v0.15.0/postgres_exporter-0.15.0.linux-amd64.tar.gz"
    dest: /tmp/postgres_exporter.tar.gz
    mode: '0644'

- name: Extract postgres_exporter
  unarchive:
    src: /tmp/postgres_exporter.tar.gz
    dest: /tmp/
    remote_src: yes

- name: Install postgres_exporter binary
  copy:
    src: /tmp/postgres_exporter-0.15.0.linux-amd64/postgres_exporter
    dest: /usr/local/bin/postgres_exporter
    owner: root
    group: root
    mode: '0755'
    remote_src: yes

- name: Create postgres_exporter env file
  template:
    src: postgres_exporter.env.j2
    dest: /etc/postgres_exporter.env
    owner: postgres_exporter
    group: postgres_exporter
    mode: '0600'
  notify: restart postgres_exporter

- name: Deploy postgres_exporter systemd service
  template:
    src: postgres_exporter.service.j2
    dest: /etc/systemd/system/postgres_exporter.service
    mode: '0644'
  notify:
    - reload systemd
    - restart postgres_exporter

- name: Start postgres_exporter
  systemd:
    name: postgres_exporter
    enabled: yes
    state: started
    daemon_reload: yes
