---
- name: Create Prometheus system user
  user:
    name: prometheus
    system: yes
    shell: /sbin/nologin
    create_home: no

- name: Create Prometheus directories
  file:
    path: "{{ item }}"
    state: directory
    owner: prometheus
    group: prometheus
    mode: '0755'
  loop:
    - /etc/prometheus
    - /etc/prometheus/rules
    - /var/lib/prometheus

- name: Download Prometheus
  get_url:
    url: "https://github.com/prometheus/prometheus/releases/download/v2.51.2/prometheus-2.51.2.linux-amd64.tar.gz"
    dest: /tmp/prometheus.tar.gz
    mode: '0644'

- name: Extract Prometheus
  unarchive:
    src: /tmp/prometheus.tar.gz
    dest: /tmp/
    remote_src: yes

- name: Install Prometheus binaries
  copy:
    src: "/tmp/prometheus-2.51.2.linux-amd64/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    owner: root
    group: root
    mode: '0755'
    remote_src: yes
  loop:
    - prometheus
    - promtool

- name: Deploy Prometheus config
  template:
    src: prometheus.yml.j2
    dest: /etc/prometheus/prometheus.yml
    owner: prometheus
    group: prometheus
    mode: '0644'
  notify: restart prometheus

- name: Deploy alert rules
  template:
    src: "rules/{{ item }}"
    dest: "/etc/prometheus/rules/{{ item | replace('.j2', '') }}"
    owner: prometheus
    group: prometheus
    mode: '0644'
  loop:
    - patroni.yml.j2
    - postgresql.yml.j2
    - walg.yml.j2
  notify: restart prometheus

- name: Deploy Prometheus systemd service
  template:
    src: prometheus.service.j2
    dest: /etc/systemd/system/prometheus.service
    mode: '0644'
  notify: restart prometheus

- name: Start and enable Prometheus
  systemd:
    name: prometheus
    enabled: yes
    state: started
    daemon_reload: yes
